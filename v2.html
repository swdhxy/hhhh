<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谣谣的专属无条件服从卡</title>
    <style>
        :root {
            --primary-pink: #ff758f;
            --dark-pink: #c9184a;
            --light-pink: #ffb3c1;
            --bg-color: #fff0f3;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 179, 193, 0.4) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(255, 143, 163, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #444;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* 音乐控制 */
        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            z-index: 1000;
            font-size: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 32px rgba(255, 117, 143, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #music-control:hover { transform: scale(1.1); }
        .playing { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 标题区域 */
        .header {
            margin: 40px 0 20px;
            text-align: center;
            user-select: none;
        }
        h1 {
            color: var(--dark-pink);
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(201, 24, 74, 0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }
        h1:active { transform: scale(0.98); }
        .subtitle {
            color: var(--primary-pink);
            font-size: 1rem;
            margin-top: 5px;
            font-weight: 500;
        }

        /* 计数器 */
        .counter {
            font-size: 1.1rem;
            color: var(--dark-pink);
            margin-bottom: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 8px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            font-weight: bold;
        }

        /* 隐藏的控制台 (双击标题出现) */
        .setup-section {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            gap: 15px;
            align-items: center;
            animation: slideDown 0.3s ease-out;
        }
        .setup-section.active { display: flex; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input {
            width: 60px;
            padding: 8px;
            border: 2px solid var(--light-pink);
            border-radius: 10px;
            text-align: center;
            outline: none;
            font-weight: bold;
            color: var(--dark-pink);
        }

        button {
            background: linear-gradient(135deg, var(--primary-pink), var(--dark-pink));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(201, 24, 74, 0.3);
            transition: all 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201, 24, 74, 0.4); }

        /* ====== 卡片网格 ====== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 35px;
            width: 100%;
            max-width: 1100px;
            padding: 0 20px;
        }

        /* 票券外部容器：用于处理真实的3D不规则阴影 */
        .ticket-container {
            position: relative;
            cursor: pointer;
            /* 使用 drop-shadow 而不是 box-shadow，这样阴影会完美贴合缺口形状 */
            filter: drop-shadow(0 12px 20px rgba(255, 117, 143, 0.2));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ticket-container:hover:not(.used) {
            transform: translateY(-12px) scale(1.02);
            filter: drop-shadow(0 20px 35px rgba(201, 24, 74, 0.3));
        }

        /* ====== 拟物化票券主体 ====== */
        .ticket {
            position: relative;
            height: 160px;
            background: linear-gradient(135deg, #ffffff 0%, #fff5f7 100%);
            border-radius: 14px;
            display: flex;
            overflow: hidden;
            /* 核心黑科技：利用 Mask 切割出左右两侧的半圆缺口 */
            -webkit-mask: 
                radial-gradient(circle at 0px 50%, transparent 16px, #000 16.5px) left / 51% 100% no-repeat,
                radial-gradient(circle at 100% 50%, transparent 16px, #000 16.5px) right / 51% 100% no-repeat;
            mask: 
                radial-gradient(circle at 0px 50%, transparent 16px, #000 16.5px) left / 51% 100% no-repeat,
                radial-gradient(circle at 100% 50%, transparent 16px, #000 16.5px) right / 51% 100% no-repeat;
        }

        /* 镭射光泽反光效果 */
        .laser-shine {
            position: absolute;
            top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            transition: 0.6s ease-out;
            pointer-events: none;
            z-index: 5;
        }

        .ticket-container:hover:not(.used) .laser-shine { left: 200%; }

        /* 左侧彩色竖条存根 */
        .ticket-stub {
            width: 55px;
            background: linear-gradient(to bottom, var(--primary-pink), var(--dark-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.95rem;
            font-weight: 900;
            letter-spacing: 2px;
            writing-mode: vertical-rl; /* 文字竖排 */
            transform: rotate(180deg); /* 让英文从上往下读 */
            position: relative;
        }

        /* 模拟撕碎口的齿孔虚线 */
        .ticket-perforation {
            width: 0;
            border-right: 3px dashed rgba(255, 117, 143, 0.4);
            margin: 15px 0; /* 上下留白，不贯穿到底 */
            position: relative;
            z-index: 2;
        }

        /* 右侧主内容区 */
        .ticket-content {
            flex: 1;
            padding: 25px 35px 25px 20px; /* 右侧 padding 加大，避开缺口 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at top right, rgba(255,179,193,0.1), transparent 60%);
        }

        .ticket h2 { 
            color: var(--dark-pink); 
            font-size: 1.5rem; 
            margin-bottom: 8px;
        }

        .ticket p { 
            color: #777; 
            font-size: 0.95rem; 
            line-height: 1.5;
        }

        /* 核销后样式 */
        .ticket-container.used {
            filter: grayscale(0.8) opacity(0.8) drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            cursor: default;
            transform: scale(0.98);
        }

        /* 复古红色印章 */
        .stamp {
            display: none;
            position: absolute;
            right: 25px;
            top: 50%;
            width: 90px;
            height: 90px;
            border: 4px solid #c9184a;
            border-radius: 50%;
            color: #c9184a;
            font-weight: 900;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.2rem;
            z-index: 10;
            pointer-events: none;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(2px);
            transform: translateY(-50%) rotate(-20deg);
        }
        
        .stamp::before {
            content: "RUMOR";
            position: absolute;
            top: 10px;
            font-size: 0.6rem;
            letter-spacing: 2px;
        }

        .ticket-container.used .stamp {
            display: flex;
            animation: stamp-drop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes stamp-drop {
            0% { transform: translateY(-50%) rotate(0deg) scale(3); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-50%) rotate(-20deg) scale(1); opacity: 0.9; }
        }

        /* ====== 专属定制弹窗 ====== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.show { display: flex; opacity: 1; }

        .custom-modal {
            background: white;
            padding: 30px 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(201, 24, 74, 0.2);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            width: 380px;
        }
        .modal-overlay.show .custom-modal { transform: scale(1); }

        .custom-modal .heart-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .custom-modal h3 { color: var(--dark-pink); margin-bottom: 10px; font-size: 1.4rem; }
        .custom-modal p { color: #666; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.6; }
        
        .modal-btns { display: flex; gap: 15px; justify-content: center; }
        .btn-cancel { background: #f1f2f6; color: #576574; box-shadow: none; }
        .btn-cancel:hover { background: #dfe4ea; transform: translateY(0); box-shadow: none;}
        .btn-confirm { flex: 1; }

        /* 撒花粒子容器 */
        #particles {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1500;
        }

        .particle {
            position: absolute;
            font-size: 20px;
            animation: pop 1s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.2) rotate(var(--rot)); opacity: 0; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .card-grid { grid-template-columns: 1fr; gap: 20px; }
            .custom-modal { padding: 25px 20px; }
        }
    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="http://music.163.com/song/media/outer/url?id=3330620554.mp3" type="audio/mpeg">
    </audio>
    <div id="music-control" onclick="toggleMusic()">🎵</div>

    <div class="header">
        <h1 ondblclick="toggleSetup()">💖 谣谣专属无条件服从卡 💖</h1>
        <div class="subtitle">属于你的特权，随时兑换，绝不耍赖</div>
    </div>

    <div class="setup-section" id="setupSection">
        <span>✨ 补充能量：</span>
        <input type="number" id="cardAmount" value="5" min="1">
        <button onclick="initCards()">重新发放</button>
    </div>

    <div class="counter">
        🎫 剩余特权惊喜：<span id="countDisplay">0</span> 张
    </div>

    <div id="cardGrid" class="card-grid"></div>

    <div class="modal-overlay" id="customModal">
        <div class="custom-modal">
            <div class="heart-icon">💌</div>
            <h3>仪式感时刻</h3>
            <p>确定要撕下这张【无条件服从卡】进行核销吗？<br>盖章生效后，必须立刻执行哦！</p>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">我再想想</button>
                <button class="btn-confirm" onclick="confirmUse(event)">果断撕下</button>
            </div>
        </div>
    </div>

    <div id="particles"></div>

    <script>
        const bgm = document.getElementById('bgm');
        const musicBtn = document.getElementById('music-control');
        const modal = document.getElementById('customModal');
        let cards = [];
        let currentActionIndex = null;

        // 文案库
        const cardQuotes = [
            "凭此券可兑换任意要求一次",
            "本卡拥有最高解释权，不得反驳",
            "无论刮风下雨，随叫随到特权",
            "清空小脾气，无条件哄开心",
            "任性妄为许可证（单次有效）"
        ];

        window.onload = () => {
            const saved = localStorage.getItem('love_cards_ticket_v1');
            if (saved) {
                cards = JSON.parse(saved);
                render();
            } else {
                initCards(5); 
            }
        };

        function toggleSetup() {
            const setup = document.getElementById('setupSection');
            setup.classList.toggle('active');
        }

        function initCards(amount = null) {
            const num = amount || document.getElementById('cardAmount').value;
            if (cards.length > 0 && !amount && !confirm("重新发放将清空所有历史记录，确定吗？")) return;
            
            cards = [];
            for (let i = 0; i < num; i++) {
                const randomQuote = cardQuotes[Math.floor(Math.random() * cardQuotes.length)];
                cards.push({ id: Date.now() + i, used: false, quote: randomQuote });
            }
            saveAndRender();
            
            document.getElementById('setupSection').classList.remove('active');
        }

        function triggerUse(index) {
            if (cards[index].used) return;
            currentActionIndex = index;
            modal.classList.add('show');
            
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        function closeModal() {
            modal.classList.remove('show');
            currentActionIndex = null;
        }

        function confirmUse(e) {
            if (currentActionIndex !== null) {
                cards[currentActionIndex].used = true;
                saveAndRender();
                
                if (bgm.paused) toggleMusic();
                
                const rect = e.target.getBoundingClientRect();
                createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
                
                closeModal();
            }
        }

        function saveAndRender() {
            localStorage.setItem('love_cards_ticket_v1', JSON.stringify(cards));
            render();
        }

        function render() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            let activeCount = 0;

            cards.forEach((card, index) => {
                if (!card.used) activeCount++;
                
                const containerEl = document.createElement('div');
                containerEl.className = `ticket-container ${card.used ? 'used' : ''}`;
                containerEl.onclick = () => triggerUse(index);
                
                // 内部核心结构：存根 -> 齿孔虚线 -> 主内容 -> 镭射动画
                containerEl.innerHTML = `
                    <div class="ticket">
                        <div class="ticket-stub">❤ VIP PASS ❤</div>
                        <div class="ticket-perforation"></div>
                        <div class="ticket-content">
                            <h2>无条件服从卡</h2>
                            <p>${card.used ? '此票券已检票失效，记忆已封存...' : (card.quote || '凭此券可兑换任意要求一次')}</p>
                            <div class="stamp">已执行</div>
                        </div>
                        <div class="laser-shine"></div>
                    </div>
                `;
                grid.appendChild(containerEl);
            });

            document.getElementById('countDisplay').innerText = activeCount;
        }

        function toggleMusic() {
            if (bgm.paused) {
                bgm.play();
                musicBtn.classList.add('playing');
            } else {
                bgm.pause();
                musicBtn.classList.remove('playing');
            }
        }

        function createParticles(x, y) {
            const container = document.getElementById('particles');
            const particleCount = 20; 
            const emojis = ['💖', '✨', '🎫', '💕'];

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';

                const tx = (Math.random() - 0.5) * 300; 
                const ty = (Math.random() - 0.5) * 300;
                const rot = Math.random() * 360;

                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                particle.style.setProperty('--rot', `${rot}deg`);

                container.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }
    </script>
</body>
</html>
